version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestor_local_pg
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor123
      POSTGRES_DB: gestor_local
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestor"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gestor_local_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://gestor:gestor123@postgres:5432/gestor_local?schema=public"
      AUTH_SECRET: "change-me-in-production"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gestor_local_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # P14: certificados TLS (Let's Encrypt ou auto-assinado)
      # Para Let's Encrypt:
      #   /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      #   /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      # Para dev local, gerar com:
      #   openssl req -x509 -nodes -newkey rsa:2048 -keyout privkey.pem -out fullchain.pem -days 365 -subj "/CN=localhost"
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata: