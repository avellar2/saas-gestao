# Gestor Local — Produção (VPS Contabo / avgestao.com.br)
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# IMPORTANTE:
# - POSTGRES_PASSWORD deve estar setada no .env (sem fallback inseguro)
# - AUTH_SECRET, CRON_SECRET, STRIPE_* devem estar setadas no .env
# - Banco NAO expoe porta publica (rede interna Docker)
# - Backups ficam em volume nomeado persistente

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestor_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD deve estar definida no .env (sem fallback inseguro)}"
      POSTGRES_DB: ${POSTGRES_DB:-gestor_local}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - backups_prod:/backups
    networks:
      - gestor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestor_local}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gestor_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Next.js 16 standalone: bind em 0.0.0.0 (aceita conexao de 127.0.0.1)
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Imagem customizada (quando CI/CD publica no GHCR)
      # Para usar: descomente e ajuste para seu usuario/org do GitHub
      # IMAGE: ghcr.io/SEU_USUARIO_GITHUB/avgestao/app:latest
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gestor-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://$(hostname):3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Watchtower monitora este container
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  caddy:
    image: caddy:2-alpine
    container_name: gestor_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - gestor-net

  # Watchtower removido: tinha bug de compatibilidade com Docker 29.x
  # Auto-update agora e manual: use 'remote.ps1 update' apos git push
  # Quando quiser auto-update completo, ver docs/ETAPA-14-AUTOMACOES.md

volumes:
  pgdata_prod:
    name: gestor_pgdata
  uploads:
    name: gestor_uploads
  backups_prod:
    name: gestor_backups
  caddy_data:
    name: gestor_caddy_data
  caddy_config:
    name: gestor_caddy_config

networks:
  gestor-net:
    name: gestor_network
    driver: bridge
