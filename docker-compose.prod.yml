# Gestor Local — Produção (VPS Contabo / avgestao.com.br)
# Uso: docker compose -f docker-compose.prod.yml up -d
#
# IMPORTANTE:
# - POSTGRES_PASSWORD deve estar setada no .env (sem fallback inseguro)
# - AUTH_SECRET, CRON_SECRET, STRIPE_* devem estar setadas no .env
# - Banco NAO expoe porta publica (rede interna Docker)
# - Backups ficam em volume nomeado persistente

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestor_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD deve estar definida no .env (sem fallback inseguro)}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_local}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - backups_prod:/backups
    networks:
      - gestor-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor} -d ${POSTGRES_DB:-gestor_local}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gestor_app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      # Imagem customizada (quando CI/CD publica no GHCR)
      # Para usar: descomente e ajuste para seu usuario/org do GitHub
      # IMAGE: ghcr.io/SEU_USUARIO_GITHUB/avgestao/app:latest
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gestor-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Watchtower monitora este container
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  caddy:
    image: caddy:2-alpine
    container_name: gestor_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    networks:
      - gestor-net

  # Watchtower: detecta imagem nova no GHCR e reinicia container automaticamente
  # A cada 5 minutos checa; se houver nova tag, faz pull e restart
  watchtower:
    image: containrrr/watchtower
    container_name: gestor_watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_INCLUDE_STOPPED: "false"
      WATCHTOWER_REVIVE_STOPPED: "false"
      WATCHTOWER_TIMEOUT: "60s"
      # Notificacao opcional (Telegram, Discord, Slack, etc)
      WATCHTOWER_NOTIFICATIONS: "${WATCHTOWER_NOTIFICATIONS:-}"
      TZ: "America/Sao_Paulo"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gestor-net

volumes:
  pgdata_prod:
    name: gestor_pgdata
  uploads:
    name: gestor_uploads
  backups_prod:
    name: gestor_backups
  caddy_data:
    name: gestor_caddy_data
  caddy_config:
    name: gestor_caddy_config

networks:
  gestor-net:
    name: gestor_network
    driver: bridge
